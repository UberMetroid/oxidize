<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <title>OXIDIZE</title>
    <link data-trunk rel="tailwind-css" href="style/tailwind.css">
    <link data-trunk rel="copy-file" href="public/manifest.json">
    <link data-trunk rel="copy-file" href="public/sw.js">
    <link data-trunk rel="copy-dir" href="public/icons">
    <link rel="manifest" href="/manifest.json">
    <script>
        // BLOCKING THEME INITIALIZATION
        (function() {
            const savedTheme = localStorage.getItem('color-theme');
            if (savedTheme) {
                document.documentElement.className = 'theme-' + savedTheme;
            } else {
                const themes = ['red', 'orange', 'yellow', 'green', 'blue'];
                const randomTheme = themes[Math.floor(Math.random() * themes.length)];
                document.documentElement.className = 'theme-' + randomTheme;
                localStorage.setItem('color-theme', randomTheme);
            }
        })();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(error => {
                    console.log('ServiceWorker registration failed: ', error);
                });
            });
        }
    </script>
</head>
<body class="bg-black overflow-hidden fixed inset-0">
    <div id="root"></div>
    <canvas id="three-canvas" class="fixed inset-0 pointer-events-none z-0 opacity-100"></canvas>
</body>
</html>
